<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Planilha do Catálogo — Editora Santa Cruz</title>
<style>
  :root{
    --navy-dark:#0F1B26; --navy:#182631; --navy-mid:#233A4C;
    --wine:#8A1B2E; --wine-dark:#5E0F1E;
    --cream:#F3EEE1; --paper:#FAF7EF; --ink:#20242A; --gold:#B8935A;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:var(--paper); color:var(--ink);
    font-family:'EB Garamond', Georgia, serif; padding:24px;
    background-image:radial-gradient(circle at 15% 8%, rgba(138,27,46,0.05), transparent 40%),
                     radial-gradient(circle at 85% 92%, rgba(35,58,76,0.07), transparent 45%);
  }
  .card{
    max-width:520px; width:100%; text-align:center;
    background:#fff; border:1px solid #DCD4C0; border-radius:14px;
    padding:44px 36px; box-shadow:0 10px 30px rgba(15,27,38,0.10);
  }
  .brand{
    font-size:14px; letter-spacing:3px; text-transform:uppercase;
    color:var(--gold); margin-bottom:18px;
  }
  .icon{
    width:72px; height:72px; margin:0 auto 20px; border-radius:50%;
    background:linear-gradient(160deg, var(--navy-dark) 0%, var(--navy) 55%, var(--navy-mid) 100%);
    display:flex; align-items:center; justify-content:center;
  }
  .icon svg{width:34px; height:34px}
  h1{font-size:26px; color:var(--navy-dark); margin-bottom:10px; font-weight:600}
  p{font-size:17px; line-height:1.5; color:#4a4e55; margin-bottom:8px}
  .hint{font-size:15px; color:#6B6F76; margin-top:2px}
  .btn{
    display:inline-block; margin-top:22px; padding:13px 30px; border-radius:8px;
    background:var(--wine); color:var(--cream); text-decoration:none;
    font-size:17px; letter-spacing:0.4px; transition:background .15s;
  }
  .btn:hover{background:var(--wine-dark)}
  .voltar{display:block; margin-top:20px; font-size:15px; color:var(--navy-mid)}
</style>
</head>
<body>
  <div class="card">
    <div class="brand">Editora Santa Cruz</div>
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#F3EEE1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
    </div>
    <h1>Download iniciado!</h1>
    <p>A planilha do catálogo <strong>(Catalogo.xlsx)</strong> está sendo baixada.</p>
    <p class="hint">Procure o arquivo na barra de downloads do navegador ou na pasta Downloads do seu aparelho.</p>
    <a class="btn" href="Catalogo.xlsx" download>Baixar novamente</a>
    <a class="voltar" href="./">Ver o catálogo completo &rarr;</a>
  </div>
  <script>
    window.addEventListener('load', function(){
      setTimeout(function(){
        var a = document.createElement('a');
        a.href = 'Catalogo.xlsx';
        a.download = 'Catalogo.xlsx';
        document.body.appendChild(a);
        a.click();
        a.remove();
      }, 500);
    });
  </script>
</body>
</html>
